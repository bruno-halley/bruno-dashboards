const { useState, useEffect, useRef, useMemo } = React;
const html = htm.bind(React.createElement);

// ── GitHub API ──────────────────────────────────────────────────────────────

const GH = 'https://api.github.com';

function ghHeaders(token) {
  return {
    Authorization: 'Bearer ' + token,
    Accept: 'application/vnd.github.v3+json',
    'Content-Type': 'application/json',
  };
}

async function ghGet(token, repo, path) {
  const res = await fetch(GH + '/repos/' + repo + '/contents/' + path, { headers: ghHeaders(token) });
  return res.ok ? res.json() : null;
}

async function ghPut(token, repo, path, content, sha, message) {
  const bytes = new TextEncoder().encode(content);
  let bin = '';
  for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  const b64 = btoa(bin);
  const body = { message, content: b64 };
  if (sha) body.sha = sha;
  return fetch(GH + '/repos/' + repo + '/contents/' + path, {
    method: 'PUT',
    headers: ghHeaders(token),
    body: JSON.stringify(body),
  });
}

async function ghDelete(token, repo, path, sha) {
  return fetch(GH + '/repos/' + repo + '/contents/' + path, {
    method: 'DELETE',
    headers: ghHeaders(token),
    body: JSON.stringify({ message: 'remove: ' + path, sha }),
  });
}

async function ghListDir(token, repo, path) {
  const res = await fetch(GH + '/repos/' + repo + '/contents/' + path, { headers: ghHeaders(token) });
  if (!res.ok) return [];
  const data = await res.json();
  return Array.isArray(data) ? data : [];
}

// ── Utilities ────────────────────────────────────────────────────────────────

function toSlug(name) {
  return name
    .toLowerCase()
    .normalize('NFD')
    .replace(/[̀-ͯ]/g, '')
    .replace(/[^a-z0-9\s-]/g, '')
    .trim()
    .replace(/\s+/g, '-')
    .replace(/-+/g, '-')
    .replace(/^-|-$/g, '');
}

function ghpUrl(repo, slug) {
  const parts = repo.split('/');
  return 'https://' + parts[0] + '.github.io/' + parts[1] + '/dashboards/' + slug + '/index.html';
}

function formatSlug(slug) {
  return slug.split('-').map(function(w) { return w.charAt(0).toUpperCase() + w.slice(1); }).join(' ');
}

async function copyText(text) {
  try { await navigator.clipboard.writeText(text); return true; } catch(e) { return false; }
}

// ── Setup Screen ──────────────────────────────────────────────────────────────

function SetupScreen({ onSave }) {
  const [token, setToken] = useState('');
  const [repo, setRepo]   = useState('');
  const [showTok, setShowTok] = useState(false);
  const [error, setError] = useState('');
  const [busy, setBusy]   = useState(false);

  async function submit(e) {
    e.preventDefault();
    setError('');
    if (!token.trim()) return setError('Enter a GitHub token');
    if (!repo.includes('/')) return setError('Repo must be owner/repo format');
    setBusy(true);
    try {
      const res = await fetch(GH + '/repos/' + repo.trim(), {
        headers: { Authorization: 'Bearer ' + token.trim() },
      });
      if (res.status === 401) { setError('Invalid token — check scopes'); return; }
      if (res.status === 404) { setError('Repo not found or token has no access'); return; }
      if (!res.ok) { setError('GitHub error: ' + res.status); return; }
      onSave({ token: token.trim(), repo: repo.trim() });
    } catch(e) {
      setError('Network error');
    } finally {
      setBusy(false);
    }
  }

  return html`
    <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4">
      <div className="w-full max-w-md">
        <div className="text-center mb-8">
          <div className="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
            <${IcoLogo} />
          </div>
          <h1 className="text-2xl font-bold text-white">Dashboard Deployer</h1>
          <p className="text-slate-400 mt-1.5 text-sm">by Teramot — powered by GitHub Pages</p>
        </div>

        <form onSubmit=${submit} className="bg-slate-800 rounded-2xl p-6 border border-slate-700 space-y-5">
          <div>
            <label className="block text-sm font-medium text-slate-300 mb-1.5">GitHub Personal Access Token</label>
            <div className="relative">
              <input
                type=${showTok ? 'text' : 'password'}
                value=${token}
                onInput=${e => setToken(e.target.value)}
                placeholder="ghp_xxxxxxxxxxxxxxxxxxxx"
                autoComplete="off"
                className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2.5 pr-11 text-slate-100 placeholder-slate-600 font-mono text-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500"
              />
              <button type="button" onClick=${() => setShowTok(function(v) { return !v; })}
                className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300">
                <${IcoEye} off=${showTok} />
              </button>
            </div>
            <p className="text-xs text-slate-500 mt-1.5">
              Needs <span className="bg-slate-700 text-slate-300 px-1 py-0.5 rounded font-mono">Contents: Read &amp; Write</span> on the destination repo
            </p>
          </div>

          <div>
            <label className="block text-sm font-medium text-slate-300 mb-1.5">Destination Repository</label>
            <input
              type="text"
              value=${repo}
              onInput=${e => setRepo(e.target.value)}
              placeholder="owner/repository"
              className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2.5 text-slate-100 placeholder-slate-600 font-mono text-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500"
            />
            <p className="text-xs text-slate-500 mt-1.5">
              Must have GitHub Pages enabled from the <span className="font-mono bg-slate-700 text-slate-300 px-1 py-0.5 rounded">main</span> branch
            </p>
          </div>

          ${error && html`<div className="bg-red-950 border border-red-800 text-red-300 text-sm rounded-lg px-4 py-3">${error}</div>`}

          <button type="submit" disabled=${busy}
            className="w-full bg-indigo-600 hover:bg-indigo-500 disabled:opacity-60 disabled:cursor-not-allowed text-white font-medium py-2.5 rounded-lg transition-colors flex items-center justify-center gap-2">
            ${busy ? html`<${IcoSpinner} /><span>Verifying...</span>` : 'Connect & Save'}
          </button>
        </form>

        <p className="text-center text-xs text-slate-600 mt-4">
          Token stored only in your browser's localStorage — never sent anywhere except GitHub.
        </p>
      </div>
    </div>
  `;
}

// ── Preview Modal ─────────────────────────────────────────────────────────────

function PreviewModal({ source, onClose }) {
  const blobUrl = useMemo(function() {
    return URL.createObjectURL(new Blob([source], { type: 'text/html' }));
  }, [source]);

  useEffect(function() {
    return function() { URL.revokeObjectURL(blobUrl); };
  }, [blobUrl]);

  useEffect(function() {
    function handler(e) { if (e.key === 'Escape') onClose(); }
    document.addEventListener('keydown', handler);
    return function() { document.removeEventListener('keydown', handler); };
  }, [onClose]);

  return html`
    <div className="fixed inset-0 z-50 flex flex-col bg-slate-950">
      <div className="flex items-center justify-between px-4 py-3 bg-slate-900 border-b border-slate-700 shrink-0">
        <span className="text-sm font-medium text-slate-300">Preview</span>
        <button onClick=${onClose} className="text-slate-400 hover:text-slate-100"><${IcoX} /></button>
      </div>
      <iframe src=${blobUrl} className="flex-1 w-full border-0" title="Preview" sandbox="allow-scripts allow-same-origin" />
    </div>
  `;
}

// ── Deploy Tab ────────────────────────────────────────────────────────────────

function DeployTab({ config, onDeployed }) {
  const [source, setSource]       = useState(null);
  const [fileName, setFileName]   = useState('');
  const [name, setName]           = useState('');
  const [isDragging, setIsDragging] = useState(false);
  const [showPreview, setShowPreview] = useState(false);
  const [busy, setBusy]           = useState(false);
  const [result, setResult]       = useState(null);
  const [error, setError]         = useState('');
  const [copied, setCopied]       = useState(false);
  const fileRef = useRef();

  const slug = toSlug(name);
  const previewUrl = slug ? ghpUrl(config.repo, slug) : '';

  function readFile(file) {
    if (!file) return;
    if (!file.name.toLowerCase().match(/\.html?$/)) {
      setError('Please select an HTML file (.html)');
      return;
    }
    setError('');
    const reader = new FileReader();
    reader.onload = function(e) {
      setSource(e.target.result);
      setFileName(file.name);
      setName(file.name.replace(/\.html?$/i, '').replace(/[-_]/g, ' ').trim());
      setResult(null);
    };
    reader.readAsText(file, 'UTF-8');
  }

  function onDrop(e) {
    e.preventDefault();
    setIsDragging(false);
    readFile(e.dataTransfer.files[0]);
  }

  async function deploy() {
    if (!source || !slug) return;
    setBusy(true);
    setError('');
    const path = 'dashboards/' + slug + '/index.html';
    try {
      const existing = await ghGet(config.token, config.repo, path);
      const res = await ghPut(config.token, config.repo, path, source, existing && existing.sha, 'deploy: ' + slug);
      if (!res.ok) {
        const data = await res.json().catch(function() { return {}; });
        setError(data.message || 'Deploy failed (' + res.status + ')');
      } else {
        setResult({ url: ghpUrl(config.repo, slug), name: name });
        onDeployed();
      }
    } catch(e) {
      setError('Network error — check your connection');
    } finally {
      setBusy(false);
    }
  }

  async function handleCopy() {
    if (!result) return;
    const ok = await copyText(result.url);
    if (ok) { setCopied(true); setTimeout(function() { setCopied(false); }, 2000); }
  }

  function reset() {
    setSource(null); setFileName(''); setName(''); setResult(null); setError('');
  }

  if (result) {
    return html`
      <div className="max-w-lg mx-auto text-center py-12">
        <div className="w-16 h-16 bg-green-500/15 rounded-full flex items-center justify-center mx-auto mb-5">
          <svg className="w-8 h-8 text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth=${2}>
            <path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7"/>
          </svg>
        </div>
        <h3 className="text-xl font-semibold text-white mb-1">Deployed!</h3>
        <p className="text-slate-400 text-sm mb-8">GitHub Pages may take ~30 seconds to reflect changes.</p>

        <div className="bg-slate-800 border border-slate-700 rounded-xl p-4 mb-6 text-left">
          <p className="text-xs text-slate-500 mb-2 uppercase tracking-wide font-medium">Dashboard URL</p>
          <div className="flex items-start gap-2">
            <code className="flex-1 text-indigo-300 text-sm break-all leading-relaxed">${result.url}</code>
            <div className="flex gap-1 shrink-0 mt-0.5">
              <button onClick=${handleCopy} title="Copy" className="p-1.5 text-slate-400 hover:text-slate-100 hover:bg-slate-700 rounded-md transition-colors">
                ${copied ? html`<${IcoCheck} />` : html`<${IcoCopy} />`}
              </button>
              <a href=${result.url} target="_blank" rel="noopener noreferrer" className="p-1.5 text-slate-400 hover:text-slate-100 hover:bg-slate-700 rounded-md transition-colors">
                <${IcoLink} />
              </a>
            </div>
          </div>
        </div>

        <button onClick=${reset} className="text-sm text-indigo-400 hover:text-indigo-300 transition-colors">
          Deploy another dashboard →
        </button>
      </div>
    `;
  }

  const dropClass = [
    'relative border-2 border-dashed rounded-2xl p-10 text-center cursor-pointer transition-all select-none',
    isDragging ? 'border-indigo-400 bg-indigo-500/10'
    : source ? 'border-slate-600 bg-slate-800/50 hover:border-slate-500'
    : 'border-slate-700 bg-slate-800/30 hover:border-slate-600 hover:bg-slate-800/50',
  ].join(' ');

  return html`
    <div className="max-w-2xl mx-auto space-y-4">
      <div
        onDragEnter=${function(e) { e.preventDefault(); setIsDragging(true); }}
        onDragOver=${function(e) { e.preventDefault(); }}
        onDragLeave=${function(e) { if (!e.currentTarget.contains(e.relatedTarget)) setIsDragging(false); }}
        onDrop=${onDrop}
        onClick=${function() { fileRef.current && fileRef.current.click(); }}
        className=${dropClass}
      >
        <input ref=${fileRef} type="file" accept=".html,.htm" className="hidden"
          onChange=${function(e) { readFile(e.target.files[0]); }}
          onClick=${function(e) { e.stopPropagation(); }}
        />
        ${source ? html`
          <div className="flex items-center gap-4">
            <div className="text-indigo-400 shrink-0"><${IcoFile} /></div>
            <div className="flex-1 text-left min-w-0">
              <p className="font-medium text-slate-200 truncate">${fileName}</p>
              <p className="text-sm text-slate-500">${(source.length / 1024).toFixed(1)} KB — click to replace</p>
            </div>
            <button
              onClick=${function(e) { e.stopPropagation(); setShowPreview(true); }}
              className="shrink-0 flex items-center gap-1.5 text-sm bg-slate-700 hover:bg-slate-600 text-slate-200 px-3 py-1.5 rounded-lg transition-colors"
            >
              <${IcoEye} /> Preview
            </button>
          </div>
        ` : html`
          <div>
            <div className="w-14 h-14 bg-slate-700 rounded-2xl flex items-center justify-center mx-auto mb-4 text-slate-300">
              <${IcoUpload} />
            </div>
            <p className="text-slate-200 font-medium mb-1">Drop your HTML file here</p>
            <p className="text-slate-500 text-sm">or click to browse</p>
          </div>
        `}
      </div>

      ${error && html`<div className="bg-red-950 border border-red-800 text-red-300 text-sm rounded-xl px-4 py-3">${error}</div>`}

      ${source && html`
        <div className="bg-slate-800 border border-slate-700 rounded-2xl p-5 space-y-4">
          <div>
            <label className="block text-sm font-medium text-slate-300 mb-1.5">Dashboard Name</label>
            <input
              type="text"
              value=${name}
              onInput=${function(e) { setName(e.target.value); }}
              placeholder="My Awesome Dashboard"
              className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2.5 text-slate-100 placeholder-slate-600 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500"
            />
          </div>
          ${slug && html`
            <div className="bg-slate-900 rounded-lg px-3 py-2.5 text-xs font-mono break-all">
              <span className="text-slate-500">URL: </span>
              <span className="text-indigo-300">${previewUrl}</span>
            </div>
          `}
          <button
            onClick=${deploy}
            disabled=${busy || !slug}
            className="w-full bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed text-white font-medium py-2.5 rounded-lg transition-colors flex items-center justify-center gap-2"
          >
            ${busy ? html`<${IcoSpinner} /><span>Deploying...</span>` : 'Deploy to GitHub Pages'}
          </button>
        </div>
      `}

      ${showPreview && source && html`<${PreviewModal} source=${source} onClose=${function() { setShowPreview(false); }} />`}
    </div>
  `;
}

// ── Redeploy Modal ────────────────────────────────────────────────────────────

function RedeployModal({ slug, config, onClose }) {
  const [source, setSource] = useState(null);
  const [fname, setFname]   = useState('');
  const [busy, setBusy]     = useState(false);
  const [done, setDone]     = useState(false);
  const [error, setError]   = useState('');
  const ref = useRef();

  function readFile(file) {
    if (!file || !file.name.toLowerCase().match(/\.html?$/)) {
      setError('Please select an HTML file');
      return;
    }
    setError('');
    const reader = new FileReader();
    reader.onload = function(e) { setSource(e.target.result); setFname(file.name); };
    reader.readAsText(file, 'UTF-8');
  }

  async function submit() {
    if (!source) return;
    setBusy(true);
    setError('');
    const path = 'dashboards/' + slug + '/index.html';
    try {
      const existing = await ghGet(config.token, config.repo, path);
      const res = await ghPut(config.token, config.repo, path, source, existing && existing.sha, 'redeploy: ' + slug);
      if (!res.ok) { const d = await res.json().catch(function() { return {}; }); setError(d.message || 'Failed'); }
      else setDone(true);
    } catch(e) { setError('Network error'); }
    finally { setBusy(false); }
  }

  return html`
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 p-4">
      <div className="w-full max-w-md bg-slate-800 border border-slate-700 rounded-2xl p-6">
        <div className="flex items-center justify-between mb-5">
          <h3 className="font-semibold text-slate-100">Re-deploy "${formatSlug(slug)}"</h3>
          <button onClick=${onClose} className="text-slate-400 hover:text-slate-100"><${IcoX} /></button>
        </div>
        ${done ? html`
          <div className="text-center py-4">
            <div className="w-12 h-12 bg-green-500/15 rounded-full flex items-center justify-center mx-auto mb-3">
              <${IcoCheck} />
            </div>
            <p className="text-green-400 font-medium mb-1">Re-deployed!</p>
            <p className="text-slate-500 text-sm mb-4">GitHub Pages may take ~30s to update</p>
            <button onClick=${onClose} className="text-sm text-indigo-400 hover:text-indigo-300">Close</button>
          </div>
        ` : html`
          <div className="space-y-4">
            <div
              onClick=${function() { ref.current && ref.current.click(); }}
              className="border-2 border-dashed border-slate-600 rounded-xl p-6 text-center cursor-pointer hover:border-slate-500 hover:bg-slate-700/30 transition-all"
            >
              <input ref=${ref} type="file" accept=".html,.htm" className="hidden"
                onChange=${function(e) { readFile(e.target.files[0]); }} />
              ${source ? html`
                <p className="text-slate-200 text-sm">${fname} — click to change</p>
              ` : html`
                <div className="text-slate-400 flex justify-center mb-2"><${IcoUpload} /></div>
                <p className="text-slate-400 text-sm">Select new HTML file</p>
              `}
            </div>
            ${error && html`<div className="bg-red-950 border border-red-800 text-red-300 text-sm rounded-lg px-4 py-3">${error}</div>`}
            <button
              onClick=${submit}
              disabled=${!source || busy}
              className="w-full bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed text-white font-medium py-2.5 rounded-lg transition-colors flex items-center justify-center gap-2"
            >
              ${busy ? html`<${IcoSpinner} /><span>Deploying...</span>` : 'Update Dashboard'}
            </button>
          </div>
        `}
      </div>
    </div>
  `;
}

// ── Dashboards Tab ────────────────────────────────────────────────────────────

function DashboardsTab({ config, refreshKey }) {
  const [slugs, setSlugs]       = useState([]);
  const [loading, setLoading]   = useState(true);
  const [error, setError]       = useState('');
  const [deleting, setDeleting] = useState(null);
  const [confirmDel, setConfirmDel] = useState(null);
  const [copied, setCopied]     = useState(null);
  const [redeploySlug, setRedeploySlug] = useState(null);

  async function load() {
    setLoading(true);
    setError('');
    try {
      const items = await ghListDir(config.token, config.repo, 'dashboards');
      setSlugs(items.filter(function(d) { return d.type === 'dir'; }).map(function(d) { return d.name; }).sort());
    } catch(e) {
      setError('Failed to load dashboards');
    } finally {
      setLoading(false);
    }
  }

  useEffect(function() { load(); }, [refreshKey]);

  async function handleDelete(slug) {
    setDeleting(slug);
    try {
      const path = 'dashboards/' + slug + '/index.html';
      const file = await ghGet(config.token, config.repo, path);
      if (file && file.sha) await ghDelete(config.token, config.repo, path, file.sha);
      setSlugs(function(prev) { return prev.filter(function(s) { return s !== slug; }); });
    } catch(e) {
      setError('Delete failed — try again');
    } finally {
      setDeleting(null);
      setConfirmDel(null);
    }
  }

  async function handleCopy(slug) {
    const ok = await copyText(ghpUrl(config.repo, slug));
    if (ok) { setCopied(slug); setTimeout(function() { setCopied(null); }, 2000); }
  }

  if (loading) {
    return html`
      <div className="flex items-center justify-center py-20">
        <${IcoSpinner} cls="w-8 h-8 text-indigo-400" />
      </div>
    `;
  }

  return html`
    <div className="max-w-2xl mx-auto">
      <div className="flex items-center justify-between mb-4">
        <p className="text-sm text-slate-400">
          ${slugs.length === 0 ? 'No dashboards yet' : slugs.length + ' dashboard' + (slugs.length !== 1 ? 's' : '')}
        </p>
        <button onClick=${load} title="Refresh" className="text-slate-400 hover:text-slate-200 p-1.5 hover:bg-slate-700 rounded-lg transition-colors">
          <${IcoRefresh} />
        </button>
      </div>

      ${error && html`<div className="bg-red-950 border border-red-800 text-red-300 text-sm rounded-xl px-4 py-3 mb-4">${error}</div>`}

      ${slugs.length === 0 && !error && html`
        <div className="text-center py-16 text-slate-500">
          <p className="mb-1">No dashboards deployed yet.</p>
          <p className="text-sm">Go to Deploy to upload your first dashboard.</p>
        </div>
      `}

      <div className="space-y-2">
        ${slugs.map(function(slug) {
          const url = ghpUrl(config.repo, slug);
          const isDeleting = deleting === slug;
          const isConfirming = confirmDel === slug;

          return html`
            <div key=${slug} className="bg-slate-800 border border-slate-700 rounded-xl px-4 py-3.5 flex items-center gap-3">
              <div className="flex-1 min-w-0">
                <p className="font-medium text-slate-100 text-sm">${formatSlug(slug)}</p>
                <p className="text-xs text-slate-500 truncate font-mono mt-0.5">${url}</p>
              </div>
              <div className="flex items-center gap-1 shrink-0">
                <button onClick=${function() { handleCopy(slug); }} title="Copy URL"
                  className="p-2 text-slate-400 hover:text-slate-100 hover:bg-slate-700 rounded-lg transition-colors">
                  ${copied === slug ? html`<${IcoCheck} />` : html`<${IcoCopy} />`}
                </button>
                <a href=${url} target="_blank" rel="noopener noreferrer" title="Open"
                  className="p-2 text-slate-400 hover:text-slate-100 hover:bg-slate-700 rounded-lg transition-colors">
                  <${IcoLink} />
                </a>
                <button onClick=${function() { setRedeploySlug(slug); }} title="Re-deploy"
                  className="p-2 text-slate-400 hover:text-slate-100 hover:bg-slate-700 rounded-lg transition-colors">
                  <${IcoRefresh} />
                </button>
                ${isConfirming ? html`
                  <div className="flex items-center gap-1.5 ml-1">
                    <button
                      onClick=${function() { handleDelete(slug); }}
                      disabled=${isDeleting}
                      className="text-xs bg-red-600 hover:bg-red-500 disabled:opacity-60 text-white px-2.5 py-1.5 rounded-lg transition-colors flex items-center gap-1"
                    >
                      ${isDeleting ? html`<${IcoSpinner} cls="w-3 h-3" />` : 'Delete'}
                    </button>
                    <button onClick=${function() { setConfirmDel(null); }}
                      className="text-xs text-slate-400 hover:text-slate-200 px-2 py-1.5 transition-colors">Cancel</button>
                  </div>
                ` : html`
                  <button onClick=${function() { setConfirmDel(slug); }} title="Delete"
                    className="p-2 text-slate-400 hover:text-red-400 hover:bg-slate-700 rounded-lg transition-colors">
                    <${IcoTrash} />
                  </button>
                `}
              </div>
            </div>
          `;
        })}
      </div>

      ${redeploySlug && html`
        <${RedeployModal}
          slug=${redeploySlug}
          config=${config}
          onClose=${function() { setRedeploySlug(null); }}
        />
      `}
    </div>
  `;
}

// ── Settings Modal ────────────────────────────────────────────────────────────

function SettingsModal({ config, onUpdate, onClose }) {
  const [token, setToken] = useState(config.token);
  const [repo, setRepo]   = useState(config.repo);
  const [showTok, setShowTok] = useState(false);

  function save() {
    if (token.trim() && repo.trim() && repo.includes('/')) {
      onUpdate({ token: token.trim(), repo: repo.trim() });
      onClose();
    }
  }

  function reset() {
    if (confirm('Reset all settings? You will need to reconfigure the app.')) onUpdate(null);
  }

  return html`
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 p-4">
      <div className="w-full max-w-md bg-slate-800 border border-slate-700 rounded-2xl p-6">
        <div className="flex items-center justify-between mb-5">
          <h2 className="text-lg font-semibold text-white">Settings</h2>
          <button onClick=${onClose} className="text-slate-400 hover:text-slate-100"><${IcoX} /></button>
        </div>

        <div className="space-y-4 mb-6">
          <div>
            <label className="block text-sm font-medium text-slate-300 mb-1.5">GitHub Token</label>
            <div className="relative">
              <input type=${showTok ? 'text' : 'password'} value=${token}
                onInput=${function(e) { setToken(e.target.value); }}
                className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2.5 pr-11 text-slate-100 font-mono text-sm focus:outline-none focus:border-indigo-500"
              />
              <button type="button" onClick=${function() { setShowTok(function(v) { return !v; }); }}
                className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300">
                <${IcoEye} off=${showTok} />
              </button>
            </div>
          </div>
          <div>
            <label className="block text-sm font-medium text-slate-300 mb-1.5">Destination Repo</label>
            <input type="text" value=${repo}
              onInput=${function(e) { setRepo(e.target.value); }}
              className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2.5 text-slate-100 font-mono text-sm focus:outline-none focus:border-indigo-500"
            />
          </div>
        </div>

        <div className="flex items-center justify-between">
          <button onClick=${reset} className="text-sm text-red-400 hover:text-red-300 transition-colors">Reset all settings</button>
          <button onClick=${save} className="bg-indigo-600 hover:bg-indigo-500 text-white font-medium px-5 py-2 rounded-lg transition-colors text-sm">Save</button>
        </div>
      </div>
    </div>
  `;
}

// ── App ───────────────────────────────────────────────────────────────────────

function App() {
  const [config, setConfig] = useState(function() {
    try { return JSON.parse(localStorage.getItem('tdd_config') || 'null'); }
    catch(e) { return null; }
  });
  const [tab, setTab]               = useState('deploy');
  const [showSettings, setShowSettings] = useState(false);
  const [deployKey, setDeployKey]   = useState(0);

  function saveConfig(c) {
    if (c) localStorage.setItem('tdd_config', JSON.stringify(c));
    else localStorage.removeItem('tdd_config');
    setConfig(c);
  }

  if (!config) return html`<${SetupScreen} onSave=${saveConfig} />`;

  return html`
    <div className="min-h-screen bg-slate-900">
      <header className="sticky top-0 z-40 bg-slate-900/95 backdrop-blur border-b border-slate-800">
        <div className="max-w-3xl mx-auto px-4 h-14 flex items-center justify-between gap-4">
          <div className="flex items-center gap-2.5 shrink-0">
            <div className="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
              <${IcoLogo} />
            </div>
            <span className="font-semibold text-white text-sm hidden sm:block">Dashboard Deployer</span>
          </div>

          <div className="flex items-center gap-2">
            <nav className="flex bg-slate-800 rounded-lg p-0.5 border border-slate-700">
              ${['deploy', 'dashboards'].map(function(t) {
                return html`
                  <button key=${t} onClick=${function() { setTab(t); }}
                    className=${['px-4 py-1.5 rounded-md text-sm font-medium capitalize transition-colors',
                      tab === t ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:text-slate-200'].join(' ')}>
                    ${t}
                  </button>
                `;
              })}
            </nav>
            <button onClick=${function() { setShowSettings(true); }} title="Settings"
              className="p-2 text-slate-400 hover:text-slate-100 hover:bg-slate-800 rounded-lg transition-colors">
              <${IcoSettings} />
            </button>
          </div>
        </div>
      </header>

      <div className="max-w-3xl mx-auto px-4 pt-3">
        <p className="text-xs text-slate-600 font-mono">
          Deploying to${' '}
          <a href=${'https://github.com/' + config.repo} target="_blank" rel="noopener noreferrer"
            className="text-slate-500 hover:text-indigo-400 transition-colors">${config.repo}</a>
        </p>
      </div>

      <main className="max-w-3xl mx-auto px-4 py-6">
        ${tab === 'deploy'
          ? html`<${DeployTab} config=${config} onDeployed=${function() { setDeployKey(function(k) { return k + 1; }); }} />`
          : html`<${DashboardsTab} config=${config} refreshKey=${deployKey} />`
        }
      </main>

      ${showSettings && html`
        <${SettingsModal} config=${config} onUpdate=${saveConfig} onClose=${function() { setShowSettings(false); }} />
      `}
    </div>
  `;
}

ReactDOM.createRoot(document.getElementById('root')).render(html`<${App} />`);
</script>
</body>
</html>

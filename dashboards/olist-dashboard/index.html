<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olist Marketplace Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f6fa; color: #1a1a2e; padding: 24px; }
  h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 4px; }
  .subtitle { font-size: 0.82rem; color: #888; margin-bottom: 24px; }
  .kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
  .kpi { background: #fff; border-radius: 12px; padding: 18px 20px; border: 1px solid #e8eaf0; }
  .kpi-label { font-size: 0.72rem; color: #999; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .kpi-value { font-size: 1.75rem; font-weight: 700; }
  .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .card { background: #fff; border-radius: 12px; padding: 20px; border: 1px solid #e8eaf0; }
  .card.wide { grid-column: 1 / -1; }
  .card-title { font-size: 0.82rem; font-weight: 600; color: #555; margin-bottom: 14px; }
  .chart-wrap { height: 210px; position: relative; }
  .chart-wrap.tall { height: 260px; }
</style>
</head>
<body>
<h1>Olist Marketplace Dashboard</h1>
<p class="subtitle">teramot-demo-datasets · olist-marketplace</p>

<div class="kpis">
  <div class="kpi"><div class="kpi-label">Total Orders</div><div class="kpi-value">99,440</div></div>
  <div class="kpi"><div class="kpi-label">Total Revenue</div><div class="kpi-value">$16.0M</div></div>
  <div class="kpi"><div class="kpi-label">Avg Order Value</div><div class="kpi-value">$154</div></div>
  <div class="kpi"><div class="kpi-label">Avg Review Score</div><div class="kpi-value">4.09 ★</div></div>
</div>

<div class="charts">
  <div class="card">
    <div class="card-title">Payment Methods</div>
    <div class="chart-wrap"><canvas id="c-payments"></canvas></div>
  </div>
  <div class="card">
    <div class="card-title">Review Scores</div>
    <div class="chart-wrap"><canvas id="c-reviews"></canvas></div>
  </div>
  <div class="card wide">
    <div class="card-title">Top 10 Categories by Revenue</div>
    <div class="chart-wrap tall"><canvas id="c-categories"></canvas></div>
  </div>
</div>

<script>
new Chart(document.getElementById('c-payments'), {
  type: 'doughnut',
  data: {
    labels: ['Credit Card', 'Boleto', 'Voucher', 'Debit Card'],
    datasets: [{ data: [12542084, 2869361, 379437, 217990], backgroundColor: ['#4361ee','#06d6a0','#ffd166','#ef476f'], borderWidth: 2, borderColor: '#fff' }]
  },
  options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { font: { size: 11 }, boxWidth: 12 } } } }
});

new Chart(document.getElementById('c-reviews'), {
  type: 'bar',
  data: {
    labels: ['1 ★', '2 ★', '3 ★', '4 ★', '5 ★'],
    datasets: [{ data: [11424, 3151, 8179, 19142, 57328], backgroundColor: ['#ef476f','#ffd166','#8ecae6','#06d6a0','#4361ee'], borderRadius: 6 }]
  },
  options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#f0f0f0' } }, x: { grid: { display: false } } } }
});

new Chart(document.getElementById('c-categories'), {
  type: 'bar',
  data: {
    labels: ['beleza saude','relogios presentes','cama mesa banho','esporte lazer','informatica acessorios','moveis decoracao','cool stuff','utilidades domesticas','automotivo','ferramentas jardim'],
    datasets: [{ data: [1258681,1205006,1036989,988049,911954,729762,635291,632249,592720,485256], backgroundColor: '#4361ee', borderRadius: 5 }]
  },
  options: {
    indexAxis: 'y', responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: { x: { grid: { color: '#f0f0f0' }, ticks: { callback: v => '$' + (v/1e3).toFixed(0) + 'K' } }, y: { grid: { display: false } } }
  }
});
</script>
</body>
</html>
